<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Lokal</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0f172a;
  color: white;
  display: flex;
  flex-direction: column;
  height: 100vh;
}

header {
  padding: 15px;
  background: #1e293b;
  text-align: center;
  font-weight: bold;
}

#chat {
  flex: 1;
  overflow-y: auto;
  padding: 10px;
}

.bubble {
  max-width: 70%;
  padding: 10px;
  margin: 5px;
  border-radius: 10px;
}

.user {
  background: #3b82f6;
  margin-left: auto;
}

.ai {
  background: #334155;
  margin-right: auto;
}

#inputBox {
  display: flex;
  padding: 10px;
  background: #1e293b;
}

#msg {
  flex: 1;
  padding: 10px;
  border: none;
  border-radius: 5px;
}

button {
  margin-left: 10px;
  padding: 10px;
  border: none;
  background: #22c55e;
  color: white;
  border-radius: 5px;
}
</style>
</head>

<body>

<header>🤖 AI Lokal</header>

<div id="chat"></div>

<div id="inputBox">
  <input id="msg" placeholder="Tanya sesuatu...">
  <button onclick="send()">Kirim</button>
  <button onclick="resetChat()">Reset</button>
</div>

<script>
const chatBox = document.getElementById("chat");

function addMessage(text, type) {
  const div = document.createElement("div");
  div.className = "bubble " + type;
  div.innerText = text;
  chatBox.appendChild(div);
  chatBox.scrollTop = chatBox.scrollHeight;
}

async function send() {
  let input = document.getElementById("msg");
  let text = input.value.trim();
  if (!text) return;

  addMessage(text, "user");
  input.value = "";

  addMessage("AI sedang berpikir...", "ai");

  try {
    let res = await fetch("/chat", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ message: text })
    });

    let data = await res.json();

    chatBox.lastChild.remove();
    addMessage(data.reply, "ai");

  } catch (err) {
    chatBox.lastChild.remove();
    addMessage("Error koneksi ke server", "ai");
  }
}

async function resetChat() {
  await fetch("/reset", { method: "POST" });
  location.reload();
}

document.getElementById("msg").addEventListener("keypress", function(e) {
  if (e.key === "Enter") send();
});
</script>

</body>
</html>
