<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Dashboard - WEB USAHA</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .container { max-width: 800px; margin: 0 auto; padding: 20px; }
        .card {
            background: white;
            border-radius: 15px;
            padding: 30px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            margin-bottom: 30px;
        }
        .navbar {
            background: white;
            border-radius: 15px;
            padding: 15px 30px;
            margin-bottom: 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 8px;
            text-decoration: none;
            display: inline-block;
            margin: 10px;
        }
        .btn-logout {
            background: #dc3545;
        }
        h2 { color: #333; margin-bottom: 20px; }
        .welcome { font-size: 1.2em; color: #555; }
    </style>
</head>
<body>
    <div class="container">
        <div class="navbar">
            <h2>👤 User Dashboard</h2>
            <div>
                <span class="welcome">Halo, <strong>{{ username }}</strong>!</span>
                <a href="{{ url_for('logout') }}" class="btn btn-logout">Logout</a>
            </div>
        </div>

        <div class="card">
            <h2>🌐 Website Kami</h2>
            <p>Selamat datang di website resmi WEB USAHA. Silakan kunjungi website kami untuk melihat informasi terbaru.</p>
            <a href="{{ url_for('index') }}" class="btn" target="_blank">🔍 Lihat Website</a>
        </div>

        <div class="card">
            <h2>📋 Informasi Akun</h2>
            <p><strong>Username:</strong> {{ username }}</p>
            <p><strong>Status:</strong> User Biasa</p>
            <p><strong>Bergabung:</strong> {{ moment }}</p>
        </div>
    </div>
</body>
</html>
